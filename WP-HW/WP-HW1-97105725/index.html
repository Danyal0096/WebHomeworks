<!doctype html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>دفترچه نوت‌لایت</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="js/core/namespace.js" defer></script>
  <script src="js/core/constants.js" defer></script>
  <script src="js/services/id-service.js" defer></script>
  <script src="js/services/i18n-service.js" defer></script>
  <script src="js/services/storage-service.js" defer></script>
  <script src="js/services/validation-service.js" defer></script>
  <script src="js/core/store.js" defer></script>
  <script src="js/services/note-service.js" defer></script>
  <script src="js/services/folder-service.js" defer></script>
  <script src="js/services/markdown-service.js" defer></script>
  <script src="js/services/transfer-service.js" defer></script>
  <script src="js/ui/dom.js" defer></script>
  <script src="js/ui/toast.js" defer></script>
  <script src="js/ui/modal.js" defer></script>
  <script src="js/ui/editor-controller.js" defer></script>
  <script src="js/ui/sidebar-view.js" defer></script>
  <script src="js/ui/main-view.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar" aria-label="نوار کناری یادداشت‌ها" data-i18n-aria-label="sidebarLabel">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">N</div>
        <div>
          <h1 data-i18n="appTitle">دفترچه نوت‌لایت</h1>
          <p data-i18n="appSubtitle">یادداشت‌های ساده و امن</p>
        </div>
      </div>

      <div class="sidebar-controls">
        <label class="sr-only" for="searchInput" data-i18n="searchLabel">جستجو</label>
        <input id="searchInput" type="search" autocomplete="off" data-i18n-placeholder="searchPlaceholder" placeholder="جستجو در یادداشت‌ها">

        <div class="button-row">
          <button type="button" class="primary-button" data-action="create-note" data-i18n="newNote">یادداشت جدید</button>
          <button type="button" class="secondary-button" data-action="create-folder" data-i18n="newFolder">پوشه جدید</button>
        </div>

        <label class="field-label" for="sortSelect" data-i18n="sortLabel">مرتب‌سازی</label>
        <select id="sortSelect">
          <option value="updated-desc" data-i18n="sortUpdated">آخرین ویرایش</option>
          <option value="created-desc" data-i18n="sortCreated">جدیدترین</option>
          <option value="title-asc" data-i18n="sortTitle">عنوان</option>
        </select>
      </div>

      <nav id="sidebarContent" class="sidebar-content" aria-live="polite"></nav>

      <div class="sidebar-footer">
        <input id="importInput" class="file-input" type="file" accept="application/json,.json">
        <div class="button-row">
          <button type="button" class="secondary-button" data-action="export" data-i18n="exportData">خروجی JSON</button>
          <button type="button" class="secondary-button" data-action="import" data-i18n="importData">ورودی JSON</button>
        </div>
        <div class="button-row">
          <button type="button" class="ghost-button" data-action="toggle-theme" data-i18n="toggleTheme">حالت تاریک</button>
          <button type="button" class="ghost-button" data-action="toggle-locale" data-i18n="toggleLanguage">English</button>
        </div>
      </div>
    </aside>

    <main id="mainContent" class="main-area" tabindex="-1"></main>
  </div>

  <div id="modalRoot" class="modal-root" aria-live="assertive"></div>
  <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
