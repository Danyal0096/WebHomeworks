components:
  schemas:
    ActiveSubscription:
      type: object
      properties:
        id:
          type: string
        tier:
          type: string
        status:
          type: string
        startsAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        canUpgradeToGold:
          type: boolean
      required:
      - canUpgradeToGold
      - expiresAt
      - id
      - startsAt
      - status
      - tier
    AuditEvent:
      type: object
      properties:
        id:
          type: string
        actorId:
          type: string
          nullable: true
        action:
          type: string
          maxLength: 120
        target:
          type: string
          maxLength: 180
        before:
          nullable: true
        after:
          nullable: true
        createdAt:
          type: string
          format: date-time
        requestId:
          type: string
      required:
      - action
      - actorId
      - createdAt
      - id
      - requestId
      - target
    GenderEnum:
      enum:
      - female
      - male
      - non_binary
      - prefer_not_to_say
      type: string
      description: |-
        * `female` - Female
        * `male` - Male
        * `non_binary` - Non-binary
        * `prefer_not_to_say` - Prefer not to say
    KindEnum:
      enum:
      - critical
      - important
      - social
      - release
      type: string
      description: |-
        * `critical` - Critical
        * `important` - Important
        * `social` - Social
        * `release` - Release
    LocaleEnum:
      enum:
      - en
      - es
      - de
      - fr
      - ru
      - zh-CN
      type: string
      description: |-
        * `en` - English
        * `es` - Spanish
        * `de` - German
        * `fr` - French
        * `ru` - Russian
        * `zh-CN` - Chinese
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    Me:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
          readOnly: true
        avatarUrl:
          type: string
          nullable: true
          readOnly: true
        kind:
          type: string
        followerCount:
          type: integer
          readOnly: true
        followingCount:
          type: integer
          readOnly: true
        isFollowing:
          type: boolean
          readOnly: true
        publicPlaylistCount:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
        birthDate:
          type: string
          format: date
        gender:
          type: string
          nullable: true
        locale:
          type: string
        timezone:
          type: string
        theme:
          type: string
        explicitContentEnabled:
          type: boolean
        notificationPreference:
          type: string
        subscription:
          type: object
          additionalProperties: {}
          readOnly: true
        artistProfile:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        password:
          type: string
          readOnly: true
        followerIds:
          type: array
          items:
            type: string
          readOnly: true
        followingIds:
          type: array
          items:
            type: string
          readOnly: true
        likedTrackIds:
          type: array
          items:
            type: string
          readOnly: true
        savedPlaylistIds:
          type: array
          items:
            type: string
          readOnly: true
        recentlyPlayedIds:
          type: array
          items:
            type: string
          readOnly: true
        streamDates:
          type: object
          additionalProperties:
            type: string
          readOnly: true
        usernameChangedAt:
          type: string
          format: date-time
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - artistProfile
      - avatarUrl
      - birthDate
      - deletedAt
      - displayName
      - email
      - explicitContentEnabled
      - followerCount
      - followerIds
      - followingCount
      - followingIds
      - gender
      - id
      - isFollowing
      - kind
      - likedTrackIds
      - locale
      - notificationPreference
      - password
      - publicPlaylistCount
      - recentlyPlayedIds
      - savedPlaylistIds
      - streamDates
      - subscription
      - theme
      - timezone
      - username
      - usernameChangedAt
    Notification:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
          maxLength: 180
        body:
          type: string
        titleKey:
          type: string
        bodyKey:
          type: string
        values: {}
        kind:
          $ref: '#/components/schemas/KindEnum'
        readAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
      - body
      - bodyKey
      - createdAt
      - id
      - kind
      - readAt
      - title
      - titleKey
      - userId
    NullEnum:
      enum:
      - null
    PatchedMe:
      type: object
      properties:
